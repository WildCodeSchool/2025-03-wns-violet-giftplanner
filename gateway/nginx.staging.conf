events {}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # --------------------
        # Backend (API GraphQL)
        # --------------------
        location /api {
            set $backend backend:3310;
            proxy_pass http://$backend;

            error_page 502 503 504 =200 /maintenance/maintenance.html;
        }

        # --------------------
        # Service image (API expresse)
        # --------------------
        location /service/picture {
            set $serviceImage picture-service:3410;
            proxy_pass http://$serviceImage;
        }

        # --------------------
        # Service message (websocket)
        # --------------------
        # set $serviceMessage message-service:3411;
        location /service/message/ {
            proxy_pass http://message-service:3411;

            proxy_http_version 1.1;
            # Websocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # CORS & Host
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_buffering off;
        }

        # --------------------
        # Frontend (React)
        # --------------------
        location / {
            set $frontend frontend:80;
            proxy_pass http://$frontend;

            # proxy_connect_timeout 2s;
            # proxy_read_timeout 3s;
            error_page 502 503 504 =200 /maintenance/maintenance.html;
        }

        # --------------------
        # Page de maintenance
        # --------------------
        location /maintenance/ {
            root /usr/share/nginx/html;
        }
    }
}
